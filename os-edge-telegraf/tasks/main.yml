---
# tasks file for os-edge-telegraf

- name: Install prerequisites (curl, gpg)
  apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: yes

- name: Download InfluxData GPG key
  ansible.builtin.get_url:
    url: https://repos.influxdata.com/influxdata-archive.key
    dest: /tmp/influxdata-archive.key
    mode: '0644'
    force: yes

- name: Dearmor InfluxData GPG key into apt keyring
  ansible.builtin.shell: gpg --dearmor --yes < /tmp/influxdata-archive.key > /etc/apt/trusted.gpg.d/influxdata-archive.gpg
  args:
    creates: /etc/apt/trusted.gpg.d/influxdata-archive.gpg

- name: Add InfluxData apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/trusted.gpg.d/influxdata-archive.gpg] https://repos.influxdata.com/debian stable main"
    state: present
    filename: influxdata
    update_cache: yes

- name: Install Telegraf
  apt:
    name: telegraf
    state: present

- name: Configure Telegraf with custom settings
  template:
    src: telegraf.conf.j2
    dest: /etc/telegraf/telegraf.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Restart telegraf

- name: Start and enable Telegraf service
  systemd:
    name: telegraf
    state: started
    enabled: yes
